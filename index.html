
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Pot Hole Warrior Map</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html, body {
    margin: 0;
    height: 100%;
}
#map {
    width: 100%;
    height: 100%;
}
#map-title {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: rgba(20,20,20,0.86);
    color: white;
    padding: 12px 18px;
    border-radius: 14px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.25);
    font-family: Arial, sans-serif;
}

.brand-row {
    display: flex;
    gap: 10px;
    align-items: center;
}

.logo-badge {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: #e5e500;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: -1px;
    border: 2px solid #000;
}

.title-main {
    font-weight: 800;
    font-size: 16px;
    line-height: 18px;
}

.title-sub {
    font-size: 12px;
    opacity: 0.82;
}

#legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 1000;
    background: rgba(255,255,255,0.94);
    padding: 12px 14px;
    border-radius: 12px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.22);
    font-family: Arial, sans-serif;
    font-size: 12px;
    line-height: 1.35;
    max-width: 230px;
}

.legend-title {
    font-weight: 800;
    margin-bottom: 6px;
}

.legend-gap {
    margin-top: 12px;
}

.gradient-bar {
    height: 12px;
    width: 200px;
    border-radius: 8px;
    background: linear-gradient(90deg, #c80000, #ff8c00, #00a03c);
    border: 1px solid rgba(0,0,0,0.25);
}

.legend-scale {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #444;
    margin-top: 4px;
}

.leaflet-bottom.leaflet-left {
    bottom: 245px;
}

.defect-dot {
    display: inline-block;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    margin-right: 7px;
    vertical-align: middle;
}

#locate-btn {
    position: fixed;
    right: 18px;
    bottom: 22px;
    z-index: 1000;
    width: 44px;
    height: 44px;
    background: #111;
    color: white;
    border: none;
    border-radius: 50%;
    font-size: 22px;
    font-weight: 900;
    line-height: 44px;
    text-align: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.30);
    cursor: pointer;
    transform: rotate(-45deg);
}

.defect-dot.severe { background: #d73027; }
.defect-dot.moderate { background: #fc8d59; }
.defect-dot.low { background: #fee08b; }

.legend-note {
    margin-top: 7px;
    color: #555;
    font-size: 11px;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="map-title">
  <div class="brand-row">
    <div class="logo-badge">PW</div>
    <div>
      <div class="title-main">Pot Hole Warrior</div>
      <div class="title-sub">Road Surface Quality & Defect Signals</div>
    </div>
  </div>
</div>

<div id="legend">
  <div class="legend-title">Road Surface Quality</div>
  <div class="gradient-bar"></div>
  <div class="legend-scale">
    <span>Very poor</span><span>Fair</span><span>Good</span>
  </div>

  <div class="legend-title legend-gap">Defect Signals</div>
  <div><span class="defect-dot severe"></span> Higher severity</div>
  <div><span class="defect-dot moderate"></span> Medium severity</div>
  <div><span class="defect-dot low"></span> Lower severity</div>
  <div class="legend-note">Bigger = more severe<br>More solid = higher confidence</div>
</div>

<button id="locate-btn" title="Centre on my location">➤</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// --------------------------------------------------
// Map init
// --------------------------------------------------
var map = L.map('map').setView([52.254, -0.842], 13);

L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }
).addTo(map);

var segmentLayer = L.layerGroup().addTo(map);
var defectLayer = L.layerGroup().addTo(map);

var layerControl = L.control.layers(
    null,
    {
        "Road Surface Quality": segmentLayer,
        "Defect Signals": defectLayer
    },
    { collapsed: false, position: "bottomleft" }
).addTo(map);


// --------------------------------------------------
// Helpers
// --------------------------------------------------
function sqiColor(score) {
    score = Number(score);
    if (isNaN(score)) return "#999999";

    // SQI scale: 0 = bad/red, 50 = orange, 100 = good/green
    let t = Math.max(0, Math.min(1, score / 100));

    let r1, g1, b1, r2, g2, b2, a;

    if (t < 0.5) {
        // red -> orange
        a = t / 0.5;
        r1 = 200; g1 = 0;   b1 = 0;     // stronger red
        r2 = 255; g2 = 140; b2 = 0;     // stronger orange
    } else {
        // orange -> green
        a = (t - 0.5) / 0.5;
        r1 = 255; g1 = 140; b1 = 0;     // orange
        r2 = 0;   g2 = 160; b2 = 60;    // stronger green
    }

    let r = Math.round(r1 + (r2 - r1) * a);
    let g = Math.round(g1 + (g2 - g1) * a);
    let b = Math.round(b1 + (b2 - b1) * a);

    return `rgb(${r},${g},${b})`;
}

function defectColor(sev, min, max) {
    let t = (sev - min) / (max - min);
    t = Math.max(0, Math.min(1, t));

    let r, g, b;

    if (t < 0.5) {
        let a = t / 0.5;
        r = 254 + (252 - 254) * a;
        g = 224 + (141 - 224) * a;
        b = 139 + (89 - 139) * a;
    } else {
        let a = (t - 0.5) / 0.5;
        r = 252 + (215 - 252) * a;
        g = 141 + (48 - 141) * a;
        b = 89 + (39 - 89) * a;
    }

    return "rgb(" + Math.round(r) + "," + Math.round(g) + "," + Math.round(b) + ")";
}

function defectOpacity(conf) {
    return 0.12 + 0.55 * conf;
}

function defectRadius(sev, min, max) {
    let t = (sev - min) / (max - min);
    t = Math.max(0, Math.min(1, t));
    return 2 + 6 * t;
}


// --------------------------------------------------
// SEGMENTS (directional chevrons)
// --------------------------------------------------
fetch('segments.geojson')
.then(r => r.json())
.then(data => {

    data.features.forEach(f => {

        let p = f.properties;
        let c = f.geometry.coordinates;

        let angle = (p.bearing_deg || 0) - 90;

        let icon = L.divIcon({
            className: "",
            html: `<div style="
                transform: rotate(${angle}deg);
                color:${sqiColor(p.public_score)};
                font-size:18px;
                line-height:18px;
                font-weight:900;
            ">➤</div>`,
        });

        let marker = L.marker([c[1], c[0]], { icon: icon }).addTo(segmentLayer);

        function updateSegmentMarkerStyle() {
            let z = map.getZoom();

            // opacity fades in between zoom 11 → 15
            let opacity = Math.max(0, Math.min(1, (z - 11) / 4));

            // size grows slightly as you zoom in
            let size = Math.max(10, Math.min(18, 10 + (z - 11) * 2));

            let el = marker.getElement();

            if (el) {
                el.style.opacity = opacity;

                let iconDiv = el.querySelector("div");
                if (iconDiv) {
                    iconDiv.style.fontSize = size + "px";
                    iconDiv.style.lineHeight = size + "px";
                }
            }
        }

        map.on("zoomend", updateSegmentMarkerStyle);
        map.on("zoom", updateSegmentMarkerStyle);

        setTimeout(updateSegmentMarkerStyle, 500);

    });

});


// --------------------------------------------------
// DEFECTS
// --------------------------------------------------
fetch('defects.geojson')
.then(r => r.json())
.then(data => {

    let severities = data.features.map(f => f.properties.severity);
    let min = Math.min(...severities);
    let max = Math.max(...severities);

    data.features.forEach(f => {

        let p = f.properties;
        let c = f.geometry.coordinates;

        L.circleMarker([c[1], c[0]], {
            radius: defectRadius(p.severity, min, max),
            color: defectColor(p.severity, min, max),
            fillColor: defectColor(p.severity, min, max),
            fillOpacity: defectOpacity(p.confidence),
            weight: 2
        }).addTo(defectLayer);

    });

});

document.getElementById("locate-btn").addEventListener("click", function () {
    if (!navigator.geolocation) {
        alert("Location is not supported by this browser.");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        function (pos) {
            let lat = pos.coords.latitude;
            let lon = pos.coords.longitude;

            L.circleMarker([lat, lon], {
                radius: 7,
                color: "#111",
                fillColor: "#00a03c",
                fillOpacity: 0.9,
                weight: 2
            }).addTo(map);

            map.setView([lat, lon], 16);
        },
        function () {
            alert("Could not get your location.");
        },
        {
            enableHighAccuracy: true,
            timeout: 10000
        }
    );
});

</script>

</body>
</html>
